name: Release Tauri App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - platform: "ubuntu-latest"
          - platform: "macos-latest"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Sync version from tauri.conf.json to package.json and Cargo.toml
        shell: bash
        run: |
          # 从 tauri.conf.json 读取版本号
          VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")

          # 同步到 package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # 同步到 Cargo.toml
          sed -i 's/^version = ".*"/version = "'${VERSION}'"/' src-tauri/Cargo.toml

          echo "Synced version: ${VERSION}"

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "剪贴小助手 v__VERSION__"
          releaseDraft: false
          prerelease: false
